name: Validate carrier data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate public profiles
        run: |
          python3 tools/validate_public_carrier_data.py \
            carriers \
            generated/index.json

      - name: Validate device and artifact catalog
        run: |
          python3 tools/validate_device_catalog.py generated/devices

      - name: Validate community claims
        run: |
          python3 tools/validate_community_claims.py \
            community/claims \
            generated/community

      - name: Test community claim validator
        run: |
          python3 tools/test_community_claims.py

      - name: Test claim issue conversion
        run: |
          python3 tools/test_issue_to_claim.py

      - name: Test Android output generator
        run: |
          python3 tools/test_generated_android_outputs.py

      - name: Test carrier profile resolver
        run: |
          python3 tools/test_resolve_carrier_profiles.py

      - name: Check generated Android output
        run: |
          python3 tools/generate_android_outputs.py \
            carriers \
            generated \
            --apn-version 8
          git diff --exit-code -- generated
