name: Wrong or missing carrier data
description: Report a missing carrier or a carrier setting that looks wrong.
title: "[carrier-data] "
labels:
  - carrier-data
body:
  - type: markdown
    attributes:
      value: |
        Use this for missing or incorrect APN, MMS, IMS, RCS, eSIM, tethering, XCAP, CarrierConfig, or matching data.

        Do not include phone numbers, account data, personal passwords, private vendor credentials, full IMSI values, full ICCID values, IMEI, serial numbers, raw logs, raw bugreports, raw firmware dumps, or private vendor responses. Public APN usernames/passwords are okay only when they are carrier settings, not private account credentials.
  - type: input
    id: carrier
    attributes:
      label: Carrier name
      description: Include the public brand name shown to users.
      placeholder: Example Mobile
    validations:
      required: true
  - type: input
    id: country
    attributes:
      label: Country
      placeholder: Germany
    validations:
      required: true
  - type: dropdown
    id: carrier_type
    attributes:
      label: Carrier type
      options:
        - Main carrier
        - MVNO or sub-brand
        - Roaming profile
        - Test or lab profile
        - I am not sure
    validations:
      required: true
  - type: checkboxes
    id: affected_features
    attributes:
      label: Affected feature
      options:
        - label: Mobile data APN
        - label: MMS APN
        - label: IMS APN
        - label: VoLTE
        - label: Wi-Fi Calling
        - label: VoNR
        - label: SMS over IMS
        - label: RCS
        - label: eSIM
        - label: Tethering
        - label: XCAP or supplementary services
        - label: Conference calling
        - label: Carrier matching or MVNO detection
        - label: Other
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Explain what currently happens and what you expected.
      placeholder: The generated MMS APN has no MMSC, so MMS receive fails.
    validations:
      required: true
  - type: textarea
    id: safe_match
    attributes:
      label: Safe carrier matching details
      description: Share only safe values. Do not post full IMSI, full ICCID, IMEI, or phone numbers.
      placeholder: "MCC/MNC: 26299, SPN: Example, GID1 prefix: AB"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Public source links or a short safe test summary.
      placeholder: Public help page URL, tested MMS send/receive on 2026-07-05.
    validations:
      required: true
  - type: input
    id: device_os
    attributes:
      label: Device and OS used for testing
      placeholder: Samsung Galaxy S20, LineageOS build date 2026-07-05
  - type: input
    id: test_date
    attributes:
      label: Test date
      placeholder: "2026-07-05"
  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I did not include phone numbers, account data, personal passwords, private vendor credentials, full IMSI values, full ICCID values, IMEI, raw logs, raw bugreports, raw firmware dumps, or private vendor responses.
          required: true
