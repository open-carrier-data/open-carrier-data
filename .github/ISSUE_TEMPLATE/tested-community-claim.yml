name: Tested carrier-data change
description: Report an exact, tested carrier setting without writing JSON or using Git.
title: "[carrier claim] "
labels:
  - carrier-data
  - community-claim
body:
  - type: markdown
    attributes:
      value: |
        This form creates a proposed community claim. Automation checks it and opens a pull request. It never changes the stable database by itself.

        Do not include phone numbers, account details, personal passwords, private credentials, full IMSI/ICCID values, IMEI, raw logs, bugreports, firmware files, or private vendor responses. A public APN username/password is allowed only when a public carrier or maintained-source URL proves it is a shared setting.
  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: Example Mobile MMS works with the documented APN.
    validations:
      required: true
  - type: input
    id: carrier
    attributes:
      label: Carrier and country
      placeholder: Example Mobile, Germany
    validations:
      required: true
  - type: input
    id: mccmnc
    attributes:
      label: MCC/MNC
      description: Enter one or more public network codes, separated by commas.
      placeholder: "26299"
    validations:
      required: true
  - type: textarea
    id: optional_match
    attributes:
      label: Optional carrier match details
      description: Add only fields you know. Do not enter a full IMSI or ICCID.
      placeholder: |-
        SPN: Example
        Android carrier ID: 1234
        GID1 prefix: AB
        ICCID prefix: 8949012
        IMSI prefix pattern: 26299x1
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - add
        - confirm
        - correct
        - remove
        - override
    validations:
      required: true
  - type: dropdown
    id: affected_feature
    attributes:
      label: Affected feature or setting
      options:
        - mms
        - volte
        - vowifi
        - vonr
        - video_calling
        - sms_over_ims
        - rcs
        - esim
        - ims_conference
        - wifi_calling_roaming
        - APN settings
        - Advanced changes JSON
    validations:
      required: true
  - type: dropdown
    id: capability_state
    attributes:
      label: Desired capability state
      description: Choose not_applicable for APN or advanced changes.
      options:
        - not_applicable
        - supported
        - unsupported
        - conditional
        - unknown
    validations:
      required: true
  - type: textarea
    id: apn_settings
    attributes:
      label: APN settings
      description: Required only when Affected feature is APN settings. Add public user/password values only with a public URL below.
      placeholder: |-
        Name: Example MMS
        APN: mms.example
        Types: mms
        MMSC: https://mms.example/mmsc
        MMS proxy: 192.0.2.1
        MMS port: 8080
        Protocol: IPV4V6
  - type: textarea
    id: advanced_changes
    attributes:
      label: Advanced changes JSON
      description: Optional escape hatch for exact CarrierConfig, add-on, match, or multi-field changes.
      render: json
  - type: dropdown
    id: evidence_type
    attributes:
      label: Evidence type
      options:
        - device_test
        - carrier_documentation
        - maintained_source_reference
        - upstream_issue
    validations:
      required: true
  - type: dropdown
    id: test_result
    attributes:
      label: Test result
      options:
        - works
        - fails
        - observed
        - unknown
    validations:
      required: true
  - type: input
    id: evidence_date
    attributes:
      label: Evidence date
      placeholder: "2026-07-11"
    validations:
      required: true
  - type: textarea
    id: evidence_summary
    attributes:
      label: Evidence summary
      description: Explain exactly what was tested or what the public source says.
      placeholder: Sent and received MMS over mobile data with this setting.
    validations:
      required: true
  - type: input
    id: evidence_url
    attributes:
      label: Public evidence URL
      description: Required for carrier documentation, maintained sources, upstream issues, and public APN credentials.
      placeholder: https://example.com/carrier/settings
  - type: input
    id: device_os
    attributes:
      label: Device and OS
      description: Optional. Do not include serial numbers or other identifiers.
      placeholder: Galaxy S20, LineageOS 23
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Optional context that does not fit above.
  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I checked that this report contains no personal data, private credentials, device identifiers, raw logs, firmware, or private vendor material.
          required: true
